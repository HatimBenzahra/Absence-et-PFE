<div class="auth-container">
  <div class="auth-visual">
    <div class="visual-content">
      <img src="assets/logo-isty.png" alt="ISTY - UVSQ" class="brand-logo" />
      <p class="tagline">Gestion PFE & Présences</p>
      <p class="description">Plateforme de suivi académique et de gestion des projets de fin d'études</p>
    </div>

    <div class="circle circle-1"></div>
    <div class="circle circle-2"></div>
    <div class="circle circle-3"></div>
    <div class="glass-overlay"></div>
  </div>

  <div class="auth-form-container">
    <mat-card class="auth-card">
      <mat-card-header>
        <mat-card-title>Connexion</mat-card-title>
        <mat-card-subtitle>Accédez à votre espace</mat-card-subtitle>
      </mat-card-header>

      <mat-card-content>
        <form [formGroup]="loginForm" (ngSubmit)="onSubmit()">
          <mat-form-field appearance="outline" class="custom-field">
            <mat-label>Email</mat-label>
            <input matInput formControlName="email" type="email" placeholder="etudiant&#64;isty.fr">
            <mat-icon matPrefix>email</mat-icon>
            <mat-error *ngIf="loginForm.get('email')?.hasError('required')">L'email est requis</mat-error>
            <mat-error *ngIf="loginForm.get('email')?.hasError('email')">Email invalide</mat-error>
          </mat-form-field>

          <mat-form-field appearance="outline" class="custom-field">
            <mat-label>Mot de passe</mat-label>
            <input matInput formControlName="motDePasse" [type]="hidePassword ? 'password' : 'text'">
            <mat-icon matPrefix>lock</mat-icon>
            <button mat-icon-button matSuffix type="button" (click)="hidePassword = !hidePassword" tabindex="-1">
              <mat-icon>{{ hidePassword ? 'visibility_off' : 'visibility' }}</mat-icon>
            </button>
            <mat-error *ngIf="loginForm.get('motDePasse')?.hasError('required')">Le mot de passe est requis</mat-error>
          </mat-form-field>

          <div class="form-actions">
            <button mat-flat-button color="primary" type="submit" class="submit-btn" [disabled]="loginForm.invalid || loading">
              <span class="btn-content" *ngIf="!loading">
                Se connecter
                <mat-icon>arrow_forward</mat-icon>
              </span>
              <mat-spinner diameter="24" *ngIf="loading"></mat-spinner>
            </button>
          </div>
        </form>
      </mat-card-content>

      <mat-card-footer>
        <p class="auth-footer">
          Pas encore de compte ?
          <a routerLink="/register" class="link-primary">Créer un compte</a>
        </p>
      </mat-card-footer>
    </mat-card>
  </div>
</div>
