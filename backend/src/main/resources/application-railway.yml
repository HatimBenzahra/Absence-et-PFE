server:
  port: ${PORT:8080}

spring:
  datasource:
    url: jdbc:mysql://${MYSQLHOST:localhost}:${MYSQLPORT:3306}/${MYSQLDATABASE:isty_db}?useSSL=false&serverTimezone=UTC&allowPublicKeyRetrieval=true
    username: ${MYSQLUSER:root}
    password: ${MYSQLPASSWORD:}
    driver-class-name: com.mysql.cj.jdbc.Driver

  jpa:
    hibernate:
      ddl-auto: update
    show-sql: false
    properties:
      hibernate:
        dialect: org.hibernate.dialect.MySQLDialect
        format_sql: false

jwt:
  secret: ${JWT_SECRET:dm90cmVfc2VjcmV0X2p3dF90cmVzX2xvbmdfZXRfc2VjdXJpc2VfcG91cl9pc3R5X3BmZV9hYnNlbmNlc18yMDI0}
  expiration: 86400000
